version: 2

models:
  - name: fact_sales
    description: "One row per Shopify order line, used as the core sales fact table."
    columns:
      - name: order_line_id
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - not_null
      - name: net_sales
        tests:
          - not_null

  - name: dim_customers
    description: "One row per Shopify customer with customer attributes and lifetime sales metrics."
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: dim_products
    description: "One row per Shopify product with product attributes and lifetime sales metrics."
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: fact_inventory_snapshot
    description: "Current Shopify inventory by variant and location."
    columns:
      - name: inventory_level_key
        tests:
          - not_null
          - unique
      - name: inventory_item_id
        tests:
          - not_null
      - name: location_id
        tests:
          - not_null
      - name: variant_id
        tests:
          - not_null
      - name: available_quantity
        tests:
          - not_null

  - name: fact_daily_sales
    description: "One row per trading date and location, including orders and refunds."
    columns:
      - name: trading_date
        tests:
          - not_null

      - name: location_name
        tests:
          - not_null

      - name: gross_sales
        tests:
          - not_null

      - name: discounts
        tests:
          - not_null

      - name: returns
        tests:
          - not_null

      - name: shipping_sales
        tests:
          - not_null

      - name: taxes
        tests:
          - not_null

      - name: total_sales
        tests:
          - not_null
